general {
  gaps_in = 5
  gaps_out = 10
  border_size = 2
  col.active_border = rgba(ffffffff)
  col.inactive_border = rgba(595959aa)
  layout = dwindle
}

# Rounding / blur / shadow are intentionally disabled. Uncomment the whole
# block (not individual lines) to re-enable — Hyprland won't accept a partial
# decoration block.
#decoration {
#  rounding = 10
#  blur {
#    enabled = true
#    size = 5
#    passes = 3
#  }
#  drop_shadow = true
#  shadow_range = 4
#  shadow_render_power = 3
#  col.shadow = rgba(00000044)
#}

dwindle {
  preserve_split = true
}

animations {
  enabled = true
  bezier = easeOut, 0.25, 1, 0.5, 1
  animation = windows,    1, 3,  easeOut
  animation = border,     1, 10, default
  animation = fade,       1, 10, easeOut
  animation = workspaces, 1, 6,  easeOut
}

misc {
  disable_hyprland_logo = false
  mouse_move_enables_dpms = false
  enable_swallow = false
}
