# eDP-1 (laptop built-in) — anchored at origin, bottom of the layout when an external is stacked on top
monitor = eDP-1, preferred, 0x0, 1

# External monitors — placed above eDP-1, so moving the mouse up crosses onto them
monitor = HDMI-A-1, preferred, auto-up, 1
monitor = DP-1, preferred, auto-up, 1

# Fallback: any other monitor auto-placed to the right
monitor = , preferred, auto, 1
