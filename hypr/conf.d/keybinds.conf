# $mod and $terminal are defined in env.conf

########################
# APPS
########################
bind = $mod,       RETURN, exec, $terminal
bind = $mod,       D,      exec, wofi --show drun
bind = $mod,       E,      exec, nautilus
bind = $mod,       C,      exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
bind = $mod,       P,      exec, pavucontrol
bind = $mod,       B,      exec, blueman-manager
bind = $mod SHIFT, L,      exec, hyprlock
bind = $mod SHIFT, E,      exec, emulator -avd pixel8 -gpu host

########################
# SCREENSHOTS
# Saved to ~/Pictures/Screenshots/ with a shutter sound.
########################
bind = $mod,            S, exec, grim              ~/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png && pw-play /usr/share/sounds/freedesktop/stereo/camera-shutter.oga
bind = $mod SHIFT,      S, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png && pw-play /usr/share/sounds/freedesktop/stereo/camera-shutter.oga
bind = $mod CTRL,       S, exec, grim -g "$(slurp)" - | swappy -f -                                       && pw-play /usr/share/sounds/freedesktop/stereo/camera-shutter.oga
bind = $mod CTRL SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy                                           && pw-play /usr/share/sounds/freedesktop/stereo/camera-shutter.oga

########################
# WINDOW MANAGEMENT
########################
bind = $mod,      Q,      killactive,
bind = $mod,      F,      fullscreen,
bind = $mod,      V,      togglefloating,
bind = $mod,      ESCAPE, exit,

# Focus (vim directions)
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

# Cycle
bind = ALT,       TAB, cyclenext,
bind = ALT SHIFT, TAB, cyclenext,
bind = $mod,      TAB, focuscurrentorlast,

# Mouse drag / resize
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

########################
# WORKSPACES
########################
bind = $mod,       1, workspace,       1
bind = $mod,       2, workspace,       2
bind = $mod,       3, workspace,       3
bind = $mod,       4, workspace,       4
bind = $mod,       5, workspace,       5
bind = $mod,       6, workspace,       6
bind = $mod,       7, workspace,       7
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7

########################
# MEDIA KEYS
########################
bind = , XF86AudioRaiseVolume,  exec, pamixer -i 5
bind = , XF86AudioLowerVolume,  exec, pamixer -d 5
bind = , XF86AudioMute,         exec, pamixer -t
bind = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
